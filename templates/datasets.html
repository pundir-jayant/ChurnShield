{% extends "base.html" %}
{% block page_title %}Datasets{% endblock %}
{% block page_subtitle %}Upload, validate, preview, and batch-score customer CSV files{% endblock %}
{% block content %}
<section class="panel">
  <form id="uploadForm" class="flex flex-col gap-4 md:flex-row md:items-end">
    <div class="flex-1"><label class="label">Customer CSV</label><input type="file" name="file" accept=".csv" class="input" required></div>
    <button class="primary-btn" type="submit">Upload Dataset</button>
  </form>
  <p id="uploadStatus" class="mt-3 text-sm text-slate-400"></p>
</section>
<section class="panel mt-6"><h2 class="panel-title">Datasets</h2><div id="datasetList" class="space-y-3"></div></section>
{% endblock %}
{% block scripts %}
<script>
async function loadDatasets(){const r=await api('/api/datasets/');datasetList.innerHTML=(r.results||r).map(d=>`<div class="list-row"><div><b>${d.original_name}</b><p>${d.row_count} rows - ${d.status}</p></div><button onclick="batch(${d.id})" class="secondary-btn">Batch Predict</button></div>`).join('')}
uploadForm.onsubmit=async e=>{e.preventDefault();const fd=new FormData(uploadForm);uploadStatus.textContent='Uploading...';await fetch('/api/datasets/',{method:'POST',headers:authHeaders(false),body:fd});uploadStatus.textContent='Dataset uploaded and validated.';loadDatasets()}
async function batch(id){await fetch(`/api/datasets/${id}/batch_predict/`,{method:'POST',headers:authHeaders()});loadDatasets()}
loadDatasets()
</script>
{% endblock %}
